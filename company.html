<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Company Intelligence Database</title>
<link rel="stylesheet" href="css/style.css">
<script defer src="js/app.js"></script>
</head>
<body>
<header>
<h1>Company Intelligence Database</h1>
<p>AI Business Expansion Intelligence</p>
</header>

<div class="container">

<div class="card">
<h2>Today's Target</h2>
<ul>
<li>Research 5 new companies</li>
<li>Identify expansion plans</li>
<li>Find decision makers</li>
<li>Prioritize high-match prospects</li>
</ul>
</div>

<div class="card">
<h2>Company Details</h2>
<input type="text" placeholder="Company Name">
<input type="text" placeholder="Industry">
<input type="text" placeholder="Website">
<input type="text" placeholder="Decision Maker">
<input type="text" placeholder="Phone / Email">
<select>
<option>Research</option>
<option>High Match</option>
<option>Medium Match</option>
<option>Low Match</option>
</select>
<textarea rows="6" placeholder="Expansion plans, business notes, why this company matches your property..."></textarea>
<button>Save Company</button>
</div>

<div class="card">
<h2>Ideal Industries</h2>
<div class="grid">
<button>Hotels</button>
<button>Restaurants</button>
<button>Petrol & EV</button>
<button>Retail</button>
<button>Builders</button>
<button>Warehouses</button>
<button>Hospitals</button>
<button>Schools</button>
<button>Tourism</button>
<button>Logistics</button>
</div>
</div>

<div class="card">
<h2>Navigation</h2>
<div class="grid">
<button onclick="location.href='index.html'">Home</button>
<button onclick="location.href='research.html'">Research</button>
<button onclick="location.href='prospects.html'">Prospects</button>
<button onclick="location.href='dashboard.html'">Dashboard</button>
<button onclick="location.href='settings.html'">Settings</button>
</div>
</div>

</div>
</body>
</html>
